<!DOCTYPE html>
<html>
<head>
    <title>Profile Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-wrapper">

    <div class="top-bar">
        <div>
            <h1>Student Information Form</h1>
            <p class="form-subtitle">Please fill in your details below</p>
        </div>

        <a href="viewProfiles.jsp" class="top-button">
            View / Search / Delete Profiles
        </a>
    </div>

    <form action="ProfileServlet" method="post">

        <div class="form-row">
            <div class="form-group">
                <label>Student ID <span>*</span></label>
                <input type="text" name="studentID" placeholder="Enter your student ID" required>
            </div>

            <div class="form-group">
                <label>Name <span>*</span></label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Programme <span>*</span></label>
                <select name="programme" required>
                    <option value="">-- Select your programme --</option>
                    <option value="CDCS230">CDCS230 | Bachelor of Computer Science (Honours)</option>
                    <option value="CDCS240">CDCS240 | Bachelor of Information Technology (Honours)</option>
                    <option value="CDCS255">CDCS255 | Computer Networks</option>
                    <option value="CDCS259">CDCS259 | Intelligent Systems Engineering</option>
                    <option value="CDCS264">CDCS264 | Business Computing</option>
                    <option value="CDCS266">CDCS266 | Information Systems Engineering</option>
                    <option value="CS248">CS248 | Management Mathematics</option>
                    <option value="CS249">CS249 | Mathematics</option>
                    <option value="CS261">CS261 | Data Analytics Statistics</option>
                    <option value="CS262">CS262 | Actuarial Science</option>
                    <option value="CS267">CS267 | Mathematical Modeling and Analytics</option>
                </select>
            </div>

            <div class="form-group">
                <label>Email <span>*</span></label>
                <input type="email" name="email" placeholder="Enter your email address" required>
            </div>
        </div>

        <label>Hobbies <span>*</span></label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="hobbies" value="Reading"> Reading</label>
            <label><input type="checkbox" name="hobbies" value="Music"> Music</label>
            <label><input type="checkbox" name="hobbies" value="Sports"> Sports</label>
            <label><input type="checkbox" name="hobbies" value="Gaming"> Gaming</label>
            <label><input type="checkbox" name="hobbies" value="Cooking"> Cooking</label>
            <label><input type="checkbox" name="hobbies" value="Travel"> Travel</label>
        </div>

        <label>Introduction <span>*</span></label>
        <textarea name="introduction" rows="5" maxlength="500" placeholder="Tell us about yourself" required></textarea>

        <div class="button-area">
            <input type="submit" value="Save Profile" class="btn-submit">
            <input type="reset" value="Clear" class="btn-reset">
        </div>

    </form>

</div>

<script>
document.querySelector("form").addEventListener("submit", function(event) {
    var hobbies = document.querySelectorAll('input[name="hobbies"]:checked');

    if (hobbies.length === 0) {
        alert("Please select at least one hobby.");
        event.preventDefault();
    }
});
</script>

</body>
</html>
